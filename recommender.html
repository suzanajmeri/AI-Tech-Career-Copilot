{% extends "base.html" %}
{% block content %}
<section class="panel container">
  <h2>Career Recommender</h2>
  <div class="controls">
    <input id="skillInput" 
           placeholder="Enter skills (python, sql, react)" 
           onkeydown="if(event.key==='Enter'){getCareer();}" />
    <button class="btn" onclick="getCareer()">Generate</button>
  </div>
  <div id="result" class="result-grid"></div>
</section>
{% endblock %}
